name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # يسمح لك بتشغيله يدوياً من زر

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: تحميل الكود من المستودع
      uses: actions/checkout@v4

    - name: تثبيت بايثون
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: تثبيت المكتبات المطلوبة
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: بناء الملف التنفيذي باستخدام PyInstaller
      run: |
        pyinstaller --onefile --windowed --hidden-import tkinterdnd2 app.py

    - name: رفع الملف التنفيذي كـ artifact
      uses: actions/upload-artifact@v4
      with:
        name: USB-File-Vault
        path: dist/app.exe
